<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aadil & Simran</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff;
    --baby-blue: #b8d8e8;
    --baby-blue-light: #e0eef5;
    --baby-blue-dark: #7fb3d1;
    --gold: #c9a961;
    --gold-light: #e8d5a3;
    --charcoal: #2a2a2a;
    --soft-gray: #f8f9fb;
    --text: #2a2a2a;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --card-bg: #ffffff;
    --shadow: 0 4px 20px rgba(127, 179, 209, 0.08);
    --shadow-hover: 0 8px 30px rgba(127, 179, 209, 0.15);
  }
  [data-theme="dark"] {
    --white: #1a1d23;
    --baby-blue: #4a7a94;
    --baby-blue-light: #2a3540;
    --baby-blue-dark: #7fb3d1;
    --gold: #d4b876;
    --soft-gray: #22262e;
    --text: #e8eaed;
    --text-muted: #9ca3af;
    --border: #2f3540;
    --card-bg: #22262e;
    --charcoal: #e8eaed;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--soft-gray);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }
  /* LOCK SCREEN */
  .lock-screen {
    position: fixed; inset: 0; background: linear-gradient(135deg, var(--baby-blue-light), var(--white));
    display: flex; align-items: center; justify-content: center; z-index: 9999;
    flex-direction: column; gap: 30px;
  }
  .lock-screen h1 {
    font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 700; color: var(--charcoal); letter-spacing: -1px;
  }
  .lock-screen h1 span { color: var(--gold); font-style: italic; font-weight: 400; }
  .lock-box {
    background: var(--card-bg); padding: 40px; border-radius: 20px;
    box-shadow: var(--shadow); text-align: center; max-width: 400px; width: 90%;
  }
  .lock-box p { color: var(--text-muted); margin-bottom: 20px; font-size: 0.95rem; }
  .lock-box input {
    width: 100%; padding: 15px 20px; border: 2px solid var(--border);
    border-radius: 12px; font-size: 1.5rem; text-align: center;
    letter-spacing: 10px; background: var(--soft-gray); color: var(--text);
    font-family: 'Cormorant Garamond', serif;
  }
  .lock-box input:focus { outline: none; border-color: var(--baby-blue-dark); }
  .lock-box button {
    margin-top: 15px; width: 100%; padding: 14px; border: none;
    background: var(--charcoal); color: var(--white);
    border-radius: 12px; font-size: 1rem; cursor: pointer;
    font-family: 'Inter', sans-serif; letter-spacing: 1px; transition: 0.3s;
  }
  .lock-box button:hover { background: var(--gold); }
  .lock-error { color: #d93a3a; font-size: 0.85rem; margin-top: 10px; min-height: 20px; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--white), var(--baby-blue-light));
    padding: 50px 30px 40px; text-align: center; border-bottom: 1px solid var(--border);
    position: relative;
  }
  .names {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 6rem); font-weight: 900;
    letter-spacing: -2px; color: var(--charcoal); line-height: 1;
  }
  .names .amp {
    color: var(--gold); font-style: italic; font-weight: 400;
    margin: 0 15px; font-family: 'Cormorant Garamond', serif;
  }
  .tagline {
    margin-top: 15px; font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem; color: var(--text-muted); font-style: italic;
  }
  .header-controls {
    position: absolute; top: 20px; right: 20px; display: flex; gap: 10px;
  }
  .icon-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--card-bg); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; transition: 0.3s; color: var(--text);
  }
  .icon-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

  .counter-strip {
    display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;
    margin-top: 30px; padding: 20px; background: var(--card-bg);
    border-radius: 20px; max-width: 900px; margin-left: auto; margin-right: auto;
    box-shadow: var(--shadow);
  }
  .counter-item { text-align: center; }
  .counter-value {
    font-family: 'Playfair Display', serif; font-size: 2.2rem;
    font-weight: 700; color: var(--gold);
  }
  .counter-label {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-muted); margin-top: 5px;
  }

  /* NAV */
  nav {
    background: var(--card-bg); padding: 0 20px; overflow-x: auto;
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
  }
  .nav-inner {
    display: flex; justify-content: center; gap: 5px; max-width: 1200px;
    margin: 0 auto; white-space: nowrap;
  }
  .nav-item {
    padding: 18px 20px; font-size: 0.9rem; cursor: pointer;
    border-bottom: 2px solid transparent; transition: 0.3s;
    color: var(--text-muted); font-weight: 500;
  }
  .nav-item:hover { color: var(--gold); }
  .nav-item.active { color: var(--charcoal); border-bottom-color: var(--gold); font-weight: 600; }

  main { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
  .tab { display: none; animation: fadeIn 0.5s ease; }
  .tab.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .section-title {
    font-family: 'Playfair Display', serif; font-size: 2rem;
    font-weight: 700; margin-bottom: 8px; color: var(--charcoal);
  }
  .section-subtitle {
    color: var(--text-muted); font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem; font-style: italic; margin-bottom: 30px;
  }

  .card {
    background: var(--card-bg); border-radius: 20px; padding: 30px;
    box-shadow: var(--shadow); border: 1px solid var(--border);
    transition: 0.3s; margin-bottom: 20px;
  }
  .card:hover { box-shadow: var(--shadow-hover); }

  .grid { display: grid; gap: 20px; }
  .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
  .grid-3 { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }

  /* DASHBOARD HOME */
  .hero-quote {
    background: linear-gradient(135deg, var(--baby-blue-light), var(--white));
    padding: 50px 30px; text-align: center; border-radius: 20px;
    border: 1px solid var(--baby-blue); position: relative; overflow: hidden;
  }
  .hero-quote::before {
    content: '"'; position: absolute; top: -20px; left: 20px;
    font-family: 'Playfair Display', serif; font-size: 10rem;
    color: var(--gold); opacity: 0.2; line-height: 1;
  }
  .hero-quote-text {
    font-family: 'Cormorant Garamond', serif; font-size: 1.6rem;
    font-style: italic; color: var(--charcoal); max-width: 700px; margin: 0 auto;
  }
  .hero-quote-author {
    margin-top: 15px; font-size: 0.85rem; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold);
  }

  /* LOVE NOTE */
  .love-note-card {
    background: linear-gradient(135deg, var(--gold-light), var(--baby-blue-light));
    color: var(--charcoal);
  }
  .love-note-card .section-title { color: var(--charcoal); }
  .note-display {
    font-family: 'Cormorant Garamond', serif; font-size: 1.4rem;
    font-style: italic; min-height: 80px; padding: 20px; border-radius: 12px;
    background: rgba(255,255,255,0.5); margin-bottom: 15px;
  }
  .note-from { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }

  /* GOALS & PROGRESS */
  .progress-circle {
    position: relative; width: 120px; height: 120px; margin: 0 auto 15px;
  }
  .progress-circle svg { transform: rotate(-90deg); width: 100%; height: 100%; }
  .progress-circle circle { fill: none; stroke-width: 10; }
  .progress-bg { stroke: var(--border); }
  .progress-fill { stroke: var(--gold); stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }
  .progress-text {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-family: 'Playfair Display', serif;
    font-size: 1.5rem; font-weight: 700; color: var(--charcoal);
  }

    text-align: center; padding: 20px; border-radius: 16px;
    background: var(--soft-gray); transition:
